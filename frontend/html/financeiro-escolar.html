<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Financeiro escolar</title><link rel="stylesheet" href="../css/app-shell.css"><style>body{margin:0;background:#07101a;color:#eef4ff;font-family:Segoe UI,Tahoma,sans-serif;padding:1rem}.wrap{max-width:1180px;margin:auto;display:grid;gap:1rem}.card{background:#132232;border:1px solid #35506f;border-radius:14px;padding:1rem}h1,h2{color:#f3be49}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:.7rem}input,select,textarea,button{width:100%;box-sizing:border-box;border:1px solid #3c5778;border-radius:8px;background:#0f1a2a;color:#eef4ff;padding:.65rem}button{background:#f3be49;color:#251a06;font-weight:700;margin-top:.55rem}.item{border:1px solid #35506f;border-radius:10px;padding:.7rem;margin:.45rem 0;background:#0f1a2a}.muted{color:#adc4dd;font-size:.9rem}</style></head><body><main class="wrap"><section class="card"><h1>Financeiro escolar</h1><p class="muted">Mensalidades, bolsas/descontos, boletos internos, pagamentos e notificações.</p><button id="refresh">Atualizar minhas cobranças</button><div id="minhas"></div></section><section class="card" id="adminPanel" style="display:none"><h2>Administração financeira</h2><div class="grid"><form id="contrato"><h3>Contrato/mensalidade</h3><input name="usuario_id" placeholder="ID do usuário" required><input name="valor_base" type="number" step="0.01" placeholder="Valor mensal" required><input name="dia_vencimento" type="number" placeholder="Dia vencimento" value="10"><button>Criar contrato</button></form><form id="desconto"><h3>Bolsa/desconto</h3><input name="usuario_id" placeholder="ID do usuário" required><input name="percentual" type="number" step="0.01" placeholder="Percentual"><input name="valor" type="number" step="0.01" placeholder="Valor fixo"><input name="descricao" placeholder="Descrição"><button>Salvar bolsa/desconto</button></form><form id="cobranca"><h3>Cobrança avulsa</h3><input name="usuario_id" placeholder="ID do usuário" required><input name="descricao" placeholder="Descrição" required><input name="valor" type="number" step="0.01" placeholder="Valor" required><input name="vencimento" type="date" required><button>Gerar boleto/cobrança</button></form><form id="mensalidades"><h3>Gerar mensalidades</h3><input name="competencia" placeholder="AAAA-MM"><button>Gerar mês</button></form></div><button id="processar">Processar notificações vencidas</button><pre id="adminOut"></pre></section></main><script src="../js/runtime-api.js"></script><script>const rt=window.ordoRuntime,user=rt.getUser();if(!rt.getToken())location.href='/login';const isAdmin=['admin','ti'].includes(String(user.tipo_usuario||user.tipo||'').toLowerCase());adminPanel.style.display=isAdmin?'block':'none';function money(v){return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}async function api(path,opt){const r=await rt.apiFetch(path,opt);const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.erro||'Falha');return d}async function load(){try{const d=await api('/financeiro/cobrancas');minhas.innerHTML=d.map(c=>`<div class="item"><strong>${c.descricao}</strong><br>Status: ${c.status} | Vence: ${c.vencimento} | Valor: ${money(c.valor_final)}<br>Linha digitável: ${c.linha_digitavel||'-'}<br><button onclick="pagar(${c.id})">Registrar pagamento interno</button></div>`).join('')||'Sem cobranças.'}catch(e){minhas.textContent=e.message}}async function pagar(id){try{await api(`/financeiro/cobrancas/${id}/pagar-interno`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({metodo:'interno',status:'confirmado'})});await load()}catch(e){alert(e.message)}}function formBody(form){return Object.fromEntries(new FormData(form).entries())}contrato.addEventListener('submit',async e=>{e.preventDefault();try{adminOut.textContent=JSON.stringify(await api('/admin/financeiro/contratos',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(formBody(contrato))}),null,2)}catch(err){adminOut.textContent=err.message}});desconto.addEventListener('submit',async e=>{e.preventDefault();try{adminOut.textContent=JSON.stringify(await api('/admin/financeiro/bolsas-descontos',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(formBody(desconto))}),null,2)}catch(err){adminOut.textContent=err.message}});cobranca.addEventListener('submit',async e=>{e.preventDefault();try{adminOut.textContent=JSON.stringify(await api('/admin/financeiro/cobrancas',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(formBody(cobranca))}),null,2);await load()}catch(err){adminOut.textContent=err.message}});mensalidades.addEventListener('submit',async e=>{e.preventDefault();try{adminOut.textContent=JSON.stringify(await api('/admin/financeiro/gerar-mensalidades',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(formBody(mensalidades))}),null,2)}catch(err){adminOut.textContent=err.message}});processar.addEventListener('click',async()=>{try{adminOut.textContent=JSON.stringify(await api('/admin/financeiro/notificacoes/processar',{method:'POST'}),null,2)}catch(e){adminOut.textContent=e.message}});refresh.addEventListener('click',load);load()</script>  <script src="../js/app-shell.js" defer></script>
</body></html>
