<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Resolução de compras</title><link rel="stylesheet" href="../css/app-shell.css"><style>body{margin:0;background:#07101a;color:#eef4ff;font-family:Segoe UI,Tahoma,sans-serif;padding:1rem}.wrap{max-width:1100px;margin:auto;display:grid;grid-template-columns:360px 1fr;gap:1rem}.card{background:#132232;border:1px solid #35506f;border-radius:14px;padding:1rem}h1,h2{color:#f3be49}input,select,textarea,button{width:100%;box-sizing:border-box;border:1px solid #3c5778;border-radius:8px;background:#0f1a2a;color:#eef4ff;padding:.65rem;margin:.25rem 0 .65rem}button{background:#f3be49;color:#251a06;font-weight:700}.case,.policy{border:1px solid #35506f;border-radius:10px;padding:.7rem;margin:.5rem 0;background:#0f1a2a}.muted{color:#adc4dd;font-size:.9rem}@media(max-width:860px){.wrap{grid-template-columns:1fr}}</style></head><body><main class="wrap"><section class="card"><h1>Problema com compra</h1><p class="muted">Abra solicitações com base operacional no Código de Defesa do Consumidor. Não substitui análise jurídica.</p><form id="form"><input id="pedido_id" type="number" placeholder="ID do pedido (opcional)"><select id="tipo" required><option value="arrependimento">Arrependimento em compra online</option><option value="defeito">Produto/serviço com defeito</option><option value="cobranca_indevida">Cobrança indevida</option><option value="oferta_descumprida">Oferta não cumprida</option><option value="atraso">Atraso/não entrega</option><option value="outro">Outro</option></select><textarea id="descricao" required placeholder="Descreva o problema com datas, valores, prints e contexto"></textarea><textarea id="solucao" placeholder="Solução desejada: reembolso, troca, cancelamento, cumprimento da oferta..."></textarea><input id="evidencia" placeholder="Link de evidência/foto/print (opcional)"><button>Abrir solicitação</button></form><p id="status"></p><h2>Políticas CDC</h2><div id="politicas"></div></section><section class="card"><h2>Minhas solicitações</h2><div id="casos">Carregando...</div></section></main><script src="../js/runtime-api.js"></script><script>const rt=window.ordoRuntime;if(!rt.getToken())location.href='/login/loja/cliente?next=/cliente/resolucao';async function api(p,o){const r=await rt.apiFetch(p,o);const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.erro||'Falha');return d}async function load(){try{const [pol,cas]=await Promise.all([fetch('/vendas/politicas-cdc').then(r=>r.json()),api('/vendas/resolucoes')]);politicas.innerHTML=pol.map(p=>`<div class="policy"><strong>${p.titulo}</strong><br>${p.base_legal}<br><span class="muted">${p.descricao}</span></div>`).join('');casos.innerHTML=cas.map(c=>`<div class="case"><strong>#${c.id} ${c.tipo}</strong><br>Status: ${c.status}<br>Base: ${c.base_legal||'-'}<br>Prazo: ${c.prazo_resposta_em?new Date(c.prazo_resposta_em).toLocaleString('pt-BR'):'-'}</div>`).join('')||'Nenhuma solicitação.'}catch(e){casos.textContent=e.message}}form.addEventListener('submit',async e=>{e.preventDefault();try{const body={pedido_id:pedido_id.value||null,tipo:tipo.value,descricao:descricao.value,solucao_solicitada:solucao.value,evidencias:evidencia.value?[{url:evidencia.value}]:[]};const d=await api('/vendas/resolucoes',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});status.textContent=`Solicitação #${d.resolucao.id} aberta.`;form.reset();await load()}catch(err){status.textContent=err.message}});load()</script>  <script src="../js/app-shell.js" defer></script>
</body></html>
