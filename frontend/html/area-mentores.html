<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Área de Mentores</title><link rel="stylesheet" href="../css/app-shell.css"><style>body{margin:0;background:#07101a;color:#eef4ff;font-family:Segoe UI,Tahoma,sans-serif;padding:1rem}.wrap{max-width:1080px;margin:auto;display:grid;gap:1rem}.card{background:#132232;border:1px solid #35506f;border-radius:14px;padding:1rem}h1,h2{color:#f3be49}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:1rem}input,select,button{width:100%;box-sizing:border-box;border:1px solid #3c5778;border-radius:8px;background:#0f1a2a;color:#eef4ff;padding:.65rem;margin:.25rem 0 .65rem}button{background:#f3be49;color:#251a06;font-weight:700}.item{border:1px solid #35506f;border-radius:10px;padding:.7rem;margin:.5rem 0;background:#0f1a2a}.muted{color:#adc4dd}</style></head><body><main class="wrap"><section class="card"><h1>Área de Mentores</h1><p class="muted">Mestres, mentores e T.I. acompanham atribuições, trilhas e aulas específicas.</p><a href="/gestao-academica">Abrir gestão acadêmica</a></section><section class="grid"><form class="card" id="form"><h2>Atribuir mentor</h2><input id="mentor" placeholder="ID do mentor" required><input id="materia" placeholder="ID da matéria"><input id="turma" placeholder="ID da turma"><select id="nivel"><option value="neofito">Neófitos</option><option value="mago_n1">Magos iniciados</option><option value="mago_n2">Magos elevados</option><option value="mago_n3">Magos soberanos</option></select><button>Salvar atribuição</button><p id="msg"></p></form><section class="card"><h2>Mentores e aulas</h2><div id="lista">Carregando...</div></section></section></main><script src="../js/runtime-api.js"></script><script>const rt=window.ordoRuntime;if(!rt.getToken())location.href='/login?next=/area-mentores';async function api(p,o={}){const r=await rt.apiFetch(p,o);const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.erro||'Falha');return d}async function load(){try{const rows=await api('/academico/mentores');lista.innerHTML=rows.map(x=>`<div class="item"><strong>${x.mentor_nome||'Mentor'}</strong><br>${x.materia_nome||'Trilha livre'} | ${x.turma_nome||'Todas as turmas'} | ${x.nivel_codigo}</div>`).join('')||'Nenhum mentor atribuído.'}catch(e){lista.textContent=e.message}}form.onsubmit=async e=>{e.preventDefault();try{await api('/academico/mentores',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mentor_id:Number(mentor.value),materia_id:materia.value?Number(materia.value):null,turma_id:turma.value?Number(turma.value):null,nivel_codigo:nivel.value})});msg.textContent='Mentor atribuído.';form.reset();load()}catch(err){msg.textContent=err.message}};load()</script><script src="../js/app-shell.js" defer></script></body></html>
