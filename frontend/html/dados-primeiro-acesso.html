<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Meus dados - Ordo Caoti</title><link rel="stylesheet" href="../css/app-shell.css"><style>body{margin:0;background:#07101a;color:#eef4ff;font-family:Segoe UI,Tahoma,sans-serif;padding:1rem}.wrap{max-width:980px;margin:auto}.card{background:#132232;border:1px solid #35506f;border-radius:14px;padding:1rem}h1{color:#f3be49}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:.75rem}label{display:block;color:#adc4dd;margin:.55rem 0 .2rem}input,textarea,button{width:100%;box-sizing:border-box;border:1px solid #3c5778;border-radius:8px;background:#0f1a2a;color:#eef4ff;padding:.7rem}button{background:#f3be49;color:#251a06;font-weight:700;margin-top:1rem;cursor:pointer}.msg{min-height:1.2rem}.hint{color:#adc4dd;font-size:.9rem}</style></head>
<body><main class="wrap"><section class="card"><h1>Complete seus dados</h1><p class="hint">Os dados sensíveis são criptografados e tokenizados no backend. Acesso: você, T.I. e mestres autorizados.</p><form id="form"><div class="grid"><div><label>Nome completo</label><input id="nome_completo" required></div><div><label>E-mail</label><input id="email" type="email" required></div><div><label>WhatsApp</label><input id="whatsapp" required></div><div><label>Telefone extra</label><input id="telefone_extra"></div><div><label>CPF</label><input id="cpf" required></div><div><label>RG</label><input id="rg" required></div><div><label>Data de nascimento</label><input id="data_nascimento" type="date" required></div><div><label>Foto URL opcional</label><input id="foto_url" placeholder="https://..."></div></div><label>Endereço completo</label><textarea id="endereco" required placeholder="Rua, número, bairro, cidade, UF, CEP"></textarea><label>Dados de pagamento/cobrança</label><textarea id="pagamento" required placeholder="Preferência de cobrança, nome do pagador, observações fiscais"></textarea><label><input id="lgpd" type="checkbox" required style="width:auto"> Confirmo ciência de tratamento LGPD e auditoria de acessos aos dados</label><button type="submit">Salvar e continuar</button></form><p id="msg" class="msg"></p></section></main><script src="../js/runtime-api.js"></script><script>const runtime=window.ordoRuntime,msg=document.getElementById('msg'),user=runtime.getUser();if(!runtime.getToken()) location.href='/login';nome_completo.value=user.nome||'';email.value=user.email||'';async function load(){try{const r=await runtime.apiFetch('/me/dados-completos');const d=await r.json();if(d?.dados){for(const [k,v] of Object.entries(d.dados)){if(document.getElementById(k)&&typeof v==='string')document.getElementById(k).value=v}if(d.dados.endereco)endereco.value=typeof d.dados.endereco==='string'?d.dados.endereco:JSON.stringify(d.dados.endereco);if(d.dados.pagamento_cobranca)pagamento.value=typeof d.dados.pagamento_cobranca==='string'?d.dados.pagamento_cobranca:JSON.stringify(d.dados.pagamento_cobranca)}}catch(e){}}form.addEventListener('submit',async e=>{e.preventDefault();msg.textContent='Salvando...';try{const body={nome_completo:nome_completo.value,email:email.value,whatsapp:whatsapp.value,telefones_extras:telefone_extra.value?[telefone_extra.value]:[],cpf:cpf.value,rg:rg.value,data_nascimento:data_nascimento.value,foto_url:foto_url.value||null,endereco:{texto:endereco.value},pagamento_cobranca:{texto:pagamento.value},consentimento_lgpd:lgpd.checked};const r=await runtime.apiFetch('/me/dados-completos',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.erro||'Falha ao salvar.');runtime.setUser(d.user);location.href=d?.user?.home_route||'/dashboard-aluno'}catch(err){msg.textContent=err.message}});load();</script>  <script src="../js/app-shell.js" defer></script>
</body></html>
