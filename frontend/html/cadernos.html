<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Cadernos do aluno</title><link rel="stylesheet" href="../css/app-shell.css"><style>body{margin:0;background:#07101a;color:#eef4ff;font-family:Segoe UI,Tahoma,sans-serif;padding:1rem}.wrap{max-width:1050px;margin:auto;display:grid;grid-template-columns:320px 1fr;gap:1rem}.card{background:#132232;border:1px solid #35506f;border-radius:14px;padding:1rem}h1,h2{color:#f3be49}input,textarea,button{width:100%;box-sizing:border-box;border:1px solid #3c5778;border-radius:8px;background:#0f1a2a;color:#eef4ff;padding:.65rem;margin:.25rem 0 .65rem}button{background:#f3be49;color:#251a06;font-weight:700}.item{border-bottom:1px solid #243750;padding:.5rem;cursor:pointer}.muted{color:#adc4dd}@media(max-width:800px){.wrap{grid-template-columns:1fr}}</style></head><body><main class="wrap"><section class="card"><h1>Cadernos</h1><form id="novoCaderno"><input id="tituloCaderno" placeholder="Nome do caderno" required><button>Criar caderno</button></form><div id="cadernos">Carregando...</div></section><section class="card"><h2 id="tituloAtual">Escolha um caderno</h2><form id="novoRegistro"><input id="tituloRegistro" placeholder="Título da anotação"><textarea id="conteudo" required placeholder="Escreva sua anotação, estudo ou registro"></textarea><input id="tags" placeholder="marcadores separados por vírgula"><button>Salvar registro</button></form><div id="registros"></div></section></main><script src="../js/runtime-api.js"></script><script>const rt=window.ordoRuntime;if(!rt.getToken())location.href='/login';let active=null;async function api(p,o){const r=await rt.apiFetch(p,o);const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.erro||'Falha');return d}async function loadCadernos(){const rows=await api('/aluno/cadernos');cadernos.innerHTML=rows.map(c=>`<div class="item" onclick="openCad(${c.id},'${String(c.titulo).replace(/'/g,'')}')">${c.titulo}<br><span class="muted">privado com supervisão</span></div>`).join('')||'Nenhum caderno.'}window.openCad=async(id,titulo)=>{active=id;tituloAtual.textContent=titulo;const rows=await api(`/aluno/cadernos/${id}/registros`);registros.innerHTML=rows.map(r=>`<div class="item"><strong>${r.titulo||'Registro'}</strong><br>${r.conteudo_texto}<br><span class="muted">${r.sinalizacao==='atencao'?'Marcado para atenção da supervisão':'Normal'}</span></div>`).join('')||'Sem registros.'};novoCaderno.addEventListener('submit',async e=>{e.preventDefault();await api('/aluno/cadernos',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({titulo:tituloCaderno.value})});tituloCaderno.value='';await loadCadernos()});novoRegistro.addEventListener('submit',async e=>{e.preventDefault();if(!active)return;await api(`/aluno/cadernos/${active}/registros`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({titulo:tituloRegistro.value,conteudo_texto:conteudo.value,tags:tags.value.split(',').map(t=>t.trim()).filter(Boolean)})});tituloRegistro.value='';conteudo.value='';tags.value='';await openCad(active,tituloAtual.textContent)});loadCadernos()</script></body></html>
