<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Gestão acadêmica</title><link rel="stylesheet" href="../css/app-shell.css"><style>body{margin:0;background:#07101a;color:#eef4ff;font-family:Segoe UI,Tahoma,sans-serif;padding:1rem}.wrap{max-width:1180px;margin:auto;display:grid;gap:1rem}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1rem}.card{background:#132232;border:1px solid #35506f;border-radius:14px;padding:1rem}h1,h2{color:#f3be49}input,select,textarea,button{width:100%;box-sizing:border-box;border:1px solid #3c5778;border-radius:8px;background:#0f1a2a;color:#eef4ff;padding:.65rem;margin:.25rem 0 .65rem}button{background:#f3be49;color:#251a06;font-weight:700}.out{white-space:pre-wrap;background:#0f1a2a;border-radius:10px;padding:.75rem}.muted{color:#adc4dd;font-size:.9rem}</style></head><body><main class="wrap"><section class="card"><h1>Gestão acadêmica</h1><p class="muted">Professores e mentores lançam notas/faltas. Mestres e T.I. gerem mentores, cargos especiais e acessos de conteúdo.</p></section><section class="grid"><form class="card" id="notaForm"><h2>Lançar nota</h2><input name="usuario_id" placeholder="ID do aluno" required><input name="materia_id" placeholder="ID da matéria"><input name="nota" type="number" step="0.01" placeholder="Nota"><input name="tipo" placeholder="Tipo de avaliação"><textarea name="observacao" placeholder="Observação"></textarea><button>Salvar nota</button></form><form class="card" id="faltaForm"><h2>Lançar falta/presença</h2><input name="usuario_id" placeholder="ID do aluno" required><input name="materia_id" placeholder="ID da matéria"><input name="aula_id" placeholder="ID da aula"><select name="presente"><option value="true">Presente</option><option value="false">Falta</option></select><textarea name="justificativa" placeholder="Justificativa/observação"></textarea><button>Salvar presença/falta</button></form><form class="card" id="mentorForm"><h2>Adicionar mentor</h2><input name="mentor_id" placeholder="ID do usuário mentor" required><input name="materia_id" placeholder="ID da matéria"><input name="turma_id" placeholder="ID da turma"><select name="nivel_codigo"><option value="neofito">Neófito</option><option value="mago_n1">Mago Iniciado</option><option value="mago_n2">Mago Elevado</option><option value="mago_n3">Mago Soberano</option></select><button>Atribuir mentor</button></form><form class="card" id="cargoForm"><h2>Cargo especial</h2><input name="usuario_id" placeholder="ID do aluno" required><select name="cargo"><option value="secretaria">Secretaria</option><option value="tesouraria">Tesouraria</option><option value="comercial">Comercial</option><option value="marketing">Marketing</option><option value="vendas">Vendas</option><option value="compras">Compras</option><option value="midias_digitais">Mídias digitais</option><option value="atencao_ao_cliente">Atenção ao cliente</option><option value="juridico">Jurídico</option><option value="biblioteca">Biblioteca</option><option value="eventos">Eventos</option><option value="conteudo">Conteúdo</option><option value="operacoes">Operações</option></select><textarea name="descricao" placeholder="Descrição do cargo"></textarea><button>Atribuir cargo</button></form><form class="card" id="acessoForm"><h2>Acesso de conteúdo</h2><select name="recurso_tipo"><option value="materia">Matéria</option><option value="aula">Aula</option><option value="livro">Livro</option></select><input name="recurso_id" placeholder="ID do conteúdo" required><select name="nivel_minimo"><option value="neofito">Neófito</option><option value="mago_n1">Mago Iniciado</option><option value="mago_n2">Mago Elevado</option><option value="mago_n3">Mago Soberano</option><option value="mestre_fundador">Mestre</option></select><input name="cargos_permitidos" placeholder="Cargos extras separados por vírgula"><button>Salvar acesso</button></form><section class="card"><h2>Conteúdos liberados para mim</h2><button id="loadLiberados" type="button">Atualizar</button><pre id="liberados" class="out"></pre></section></section><section class="card"><h2>Resultado</h2><pre id="out" class="out"></pre></section></main><script src="../js/runtime-api.js"></script><script>const rt=window.ordoRuntime;if(!rt.getToken())location.href='/login?next=/gestao-academica';function body(form){const o=Object.fromEntries(new FormData(form).entries());if(o.presente!==undefined)o.presente=o.presente==='true';if(o.cargos_permitidos)o.cargos_permitidos=o.cargos_permitidos.split(',').map(x=>x.trim()).filter(Boolean);return o}async function api(path,opt={}){const r=await rt.apiFetch(path,opt);const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.erro||'Falha');return d}async function submit(form,pathBuilder){try{const b=body(form);const path=pathBuilder(b);out.textContent=JSON.stringify(await api(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}),null,2);form.reset()}catch(e){out.textContent=e.message}}notaForm.onsubmit=e=>{e.preventDefault();submit(notaForm,b=>`/professor/alunos/${b.usuario_id}/nota`)};faltaForm.onsubmit=e=>{e.preventDefault();submit(faltaForm,b=>`/professor/alunos/${b.usuario_id}/falta`)};mentorForm.onsubmit=e=>{e.preventDefault();submit(mentorForm,()=>'/academico/mentores')};cargoForm.onsubmit=e=>{e.preventDefault();submit(cargoForm,()=>'/academico/cargos-especiais')};acessoForm.onsubmit=e=>{e.preventDefault();submit(acessoForm,()=>'/academico/conteudos/acesso')};loadLiberados.onclick=async()=>{try{liberados.textContent=JSON.stringify(await api('/academico/conteudos/liberados'),null,2)}catch(e){liberados.textContent=e.message}}</script>  <script src="../js/app-shell.js" defer></script>
</body></html>
