<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Grimório público</title><link rel="stylesheet" href="../css/app-shell.css"><style>body{margin:0;background:#070707;color:#f5f5f5;font-family:Segoe UI,Tahoma,sans-serif;padding:1rem}.wrap{max-width:1100px;margin:auto;display:grid;grid-template-columns:360px 1fr;gap:1rem}.card{background:#151515;border:1px solid #333;border-radius:14px;padding:1rem}h1{color:#efc443}input,textarea,button,select{width:100%;box-sizing:border-box;border:1px solid #444;border-radius:8px;background:#0f0f0f;color:#fff;padding:.7rem;margin:.25rem 0 .65rem}button{background:#efc443;color:#1a1403;font-weight:700}.post{border-left:4px solid #efc443;background:#101010;border-radius:8px;padding:.8rem;margin-bottom:.7rem}.meta{color:#bbb;font-size:.8rem}@media(max-width:850px){.wrap{grid-template-columns:1fr}}</style></head><body><main class="wrap"><section class="card"><h1>Publicar no grimório público</h1><form id="form"><input id="titulo" placeholder="Título" required><select id="tipo"><option value="estudo">Estudo</option><option value="ritual">Ritual</option><option value="referencia">Referência</option></select><input id="tags" placeholder="tags separadas por vírgula"><textarea id="conteudo" required placeholder="Conteúdo público da Ordem"></textarea><button>Publicar</button></form><p id="status"></p></section><section class="card"><h1>Registros públicos</h1><div id="posts">Carregando...</div></section></main><script src="../js/runtime-api.js"></script><script>const rt=window.ordoRuntime;if(!rt.getToken())location.href='/login';function esc(s){return String(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}async function load(){try{const r=await rt.apiFetch('/grimorio/publico');const d=await r.json();posts.innerHTML=d.map(p=>`<article class="post"><h3>${esc(p.titulo)}</h3><div class="meta">${esc(p.autor_nome||'Ordem')} - ${new Date(p.criado_em).toLocaleString('pt-BR')}</div><p>${esc(p.conteudo_texto)}</p></article>`).join('')||'Nenhum post.'}catch(e){posts.textContent=e.message}}form.addEventListener('submit',async e=>{e.preventDefault();try{const body={titulo:titulo.value,tipo_registro:tipo.value,tags:tags.value.split(',').map(t=>t.trim()).filter(Boolean),conteudo_texto:conteudo.value};const r=await rt.apiFetch('/grimorio/publico',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.erro||'Falha');form.reset();await load()}catch(err){status.textContent=err.message}});load()</script></body></html>
