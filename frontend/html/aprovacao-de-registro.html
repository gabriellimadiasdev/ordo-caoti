<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aprovação de Acessos - Ordo Caoti</title>
  <link rel="stylesheet" href="../css/responsivo.css">
  <link rel="stylesheet" href="../css/app-shell.css">
  <style>
    body{font-family:'Segoe UI',Tahoma,sans-serif;background:#1a1a1a;color:#f0f0f0;margin:0;padding:2rem}h1{color:#c8a2c8;text-align:center}.top{max-width:1100px;margin:0 auto 1rem;display:flex;justify-content:space-between;gap:.75rem;flex-wrap:wrap}.table-container{max-width:1100px;margin:0 auto;overflow-x:auto;background:#2a2a2a;border-radius:8px;box-shadow:0 4px 10px rgba(0,0,0,.5);padding:1rem}table{width:100%;border-collapse:collapse;min-width:850px;font-size:.9rem}th,td{border:1px solid #444;padding:8px 12px;text-align:left;vertical-align:top}th{background:#333;color:#c8a2c8;text-transform:uppercase;font-size:.85rem}tr:nth-child(even){background:#252525}.status-pendente{color:#ffd700;font-weight:bold}.actions{display:flex;gap:.5rem;flex-wrap:wrap}button,.btn{padding:7px 12px;border:0;border-radius:4px;cursor:pointer;font-weight:bold;text-decoration:none;display:inline-block}.btn-approve{background:#4cd137;color:#111}.btn-reject{background:#e84118;color:#fff}.btn-refresh{background:#ffc400;color:#111}.msg{max-width:1100px;margin:1rem auto;color:#ccc}.muted{color:#999}
  </style>
</head>
<body>
  <h1>Aprovação de Acessos</h1>
  <div class="top">
    <a class="btn btn-refresh" href="/dashboard-ti">Voltar ao Dashboard T.I.</a>
    <button class="btn-refresh" type="button" id="refreshBtn">Atualizar</button>
  </div>
  <p class="msg" id="msg">Carregando solicitações pendentes...</p>
  <div class="table-container">
    <table>
      <thead><tr><th>ID</th><th>Nome</th><th>E-mail</th><th>Tipo</th><th>Nível</th><th>Observação</th><th>Data</th><th>Ações</th></tr></thead>
      <tbody id="tbody"><tr><td colspan="8">Carregando...</td></tr></tbody>
    </table>
  </div>
  <script src="../js/runtime-api.js"></script>
  <script>
    const runtime = window.ordoRuntime || { apiUrl: (p) => p, appRoute: (_r,f)=>`./${f}` };
    const token = localStorage.getItem('token') || sessionStorage.getItem('token') || '';
    const tbody = document.getElementById('tbody');
    const msg = document.getElementById('msg');
    if (!token) window.location.href = runtime.appRoute('/login-ti', 'login-ti.html');
    const headers = () => ({ Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' });
    function esc(v){ return String(v ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    async function load(){
      msg.textContent = 'Carregando solicitações pendentes...';
      try {
        const res = await fetch(runtime.apiUrl('/admin/solicitacoes-acesso?status=pendente'), { headers: headers() });
        const rows = await res.json().catch(() => []);
        if (!res.ok) throw new Error(rows?.erro || 'Falha ao carregar solicitações.');
        if (!rows.length) { tbody.innerHTML = '<tr><td colspan="8" class="muted">Nenhuma solicitação pendente.</td></tr>'; msg.textContent = 'Sem pendências.'; return; }
        tbody.innerHTML = rows.map(r => `<tr><td>${r.id}</td><td>${esc(r.nome)}</td><td>${esc(r.email)}</td><td>${esc(r.tipo_solicitado)}</td><td>${esc(r.nivel_codigo)}</td><td>${esc(r.observacao || '-')}</td><td>${new Date(r.criado_em).toLocaleString('pt-BR')}</td><td><div class="actions"><button class="btn-approve" onclick="approve(${r.id})">Aprovar</button><button class="btn-reject" onclick="rejectReq(${r.id})">Rejeitar</button></div></td></tr>`).join('');
        msg.textContent = `${rows.length} solicitação(ões) pendente(s).`;
      } catch (e) { tbody.innerHTML = '<tr><td colspan="8">Erro ao carregar.</td></tr>'; msg.textContent = e.message; }
    }
    async function approve(id){
      if (!confirm('Aprovar e criar/ativar este acesso?')) return;
      const res = await fetch(runtime.apiUrl(`/admin/solicitacoes-acesso/${id}/aprovar`), { method:'POST', headers: headers(), body:'{}' });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) return alert(data?.erro || 'Falha ao aprovar.');
      await load();
    }
    async function rejectReq(id){
      const motivo = prompt('Motivo da rejeição (opcional):') || '';
      const res = await fetch(runtime.apiUrl(`/admin/solicitacoes-acesso/${id}/rejeitar`), { method:'POST', headers: headers(), body: JSON.stringify({ motivo }) });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) return alert(data?.erro || 'Falha ao rejeitar.');
      await load();
    }
    document.getElementById('refreshBtn').addEventListener('click', load);
    window.approve = approve;
    window.rejectReq = rejectReq;
    load();
  </script>
  <script src="../js/app-shell.js" defer></script>
</body>
</html>
