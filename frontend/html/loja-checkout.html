<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Checkout interno</title><link rel="stylesheet" href="../css/app-shell.css"><style>body{margin:0;background:#07101a;color:#eef4ff;font-family:Segoe UI,Tahoma,sans-serif;padding:1rem}.card{max-width:780px;margin:auto;background:#132232;border:1px solid #35506f;border-radius:14px;padding:1rem}h1{color:#f3be49}input,select,textarea,button{width:100%;box-sizing:border-box;border:1px solid #3c5778;border-radius:8px;background:#0f1a2a;color:#eef4ff;padding:.7rem;margin:.3rem 0 .7rem}button{background:#f3be49;color:#251a06;font-weight:700}.out{white-space:pre-wrap;background:#0f1a2a;border-radius:10px;padding:.75rem}</style></head><body><main class="card"><h1>Checkout interno da loja</h1><form id="form"><label>Descrição</label><input id="descricao" value="Compra Ordo Caoti"><label>Tipo</label><select id="tipo"><option value="produto">Produto</option><option value="servico">Serviço</option><option value="workshop">Workshop isolado</option><option value="digital">Digital</option></select><label>Valor</label><input id="valor" type="number" step="0.01" required><label>Método</label><select id="metodo"><option value="boleto_interno">Boleto interno</option><option value="pix_manual">Pix manual</option><option value="cartao_interno">Cartão interno</option><option value="manual">Manual</option></select><label>Vencimento</label><input id="vencimento" type="date"><button>Gerar pedido e cobrança</button></form><pre id="out" class="out"></pre></main><script src="../js/runtime-api.js"></script><script>const rt=window.ordoRuntime;const params=new URLSearchParams(location.search);const isPublic=params.get('public')==='1';if(!isPublic&&!rt.getToken())location.href='/login';if(params.get('valor'))valor.value=params.get('valor');if(params.get('descricao'))descricao.value=params.get('descricao');async function submitCheckout(body){if(isPublic){return fetch('/api/checkout-publico',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});}return rt.apiFetch('/loja/checkout',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});}form.addEventListener('submit',async e=>{e.preventDefault();try{const body={descricao:descricao.value,total:Number(valor.value),valor:Number(valor.value),metodo:metodo.value,vencimento:vencimento.value||undefined,itens:[{tipo:tipo.value,descricao:descricao.value,preco:Number(valor.value),quantidade:1}]};const r=await submitCheckout(body);const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.erro||'Falha');if(d.redirect_url){location.href=d.redirect_url;return;}out.textContent=JSON.stringify(d,null,2)}catch(err){out.textContent=err.message}})</script></body></html>
