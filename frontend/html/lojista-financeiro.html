<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saldo e Marketplaces - Ordo Caoti</title>
  <link rel="stylesheet" href="../css/responsivo.css"><link rel="stylesheet" href="../css/app-shell.css">
  <style>body{background:#081019;color:#edf4ff;font-family:"Segoe UI",Tahoma,sans-serif;padding:1rem}.wrap{max-width:1100px;margin:0 auto;display:grid;gap:1rem}.card{background:#142233;border:1px solid #365271;border-radius:12px;padding:1rem}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1rem}input,select,button{width:100%;padding:.7rem;border-radius:8px;border:1px solid #3c5778;background:#0f1a2a;color:#edf4ff}button{background:#f3be49;color:#261b08;font-weight:700}.muted{color:#afc5de}pre{white-space:pre-wrap;background:#0f1a2a;border:1px solid #365271;border-radius:8px;padding:.8rem}</style>
</head>
<body><main class="wrap"><a href="/dashboard-lojista">Voltar ao painel</a><h1>Saldo, repasses e marketplaces</h1><section class="grid"><article class="card"><h2>Saldo lojista</h2><pre id="saldo">Carregando...</pre></article><article class="card"><h2>Solicitar repasse</h2><input id="valor" type="number" step="0.01" placeholder="Valor"><select id="metodo"><option value="pix">Pix</option><option value="boleto">Boleto</option><option value="transferencia">Transferência</option><option value="manual">Manual</option></select><input id="destino" placeholder="Chave Pix, conta ou instrução"><button id="repasseBtn">Solicitar repasse</button><p class="muted" id="msg"></p></article></section><section class="card"><h2>Marketplaces conectáveis</h2><p class="muted">As publicações multicanal sempre redirecionam para o checkout do site Ordo Caoti.</p><pre id="marketplaces">Carregando...</pre></section><section class="card"><h2>Histórico de repasses</h2><pre id="repasses">Carregando...</pre></section></main><script src="../js/runtime-api.js"></script><script>const runtime=window.ordoRuntime;async function api(p,o={}){const r=await runtime.apiFetch(p,o);const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d?.erro||'Falha');return d}async function load(){try{saldo.textContent=JSON.stringify(await api('/lojista/saldo'),null,2);marketplaces.textContent=JSON.stringify(await api('/lojista/marketplaces'),null,2);repasses.textContent=JSON.stringify(await api('/lojista/repasses'),null,2)}catch(e){msg.textContent=e.message}}repasseBtn.onclick=async()=>{try{await api('/lojista/repasses',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({valor:Number(valor.value),metodo:metodo.value,destino:destino.value})});msg.textContent='Repasse solicitado.';await load()}catch(e){msg.textContent=e.message}};load();</script><script src="../js/app-shell.js" defer></script></body></html>
