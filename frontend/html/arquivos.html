<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Arquivos online</title><link rel="stylesheet" href="../css/app-shell.css"><style>body{margin:0;background:#07101a;color:#eef4ff;font-family:Segoe UI,Tahoma,sans-serif;padding:1rem}.wrap{max-width:900px;margin:auto;background:#132232;border:1px solid #35506f;border-radius:14px;padding:1rem}h1{color:#f3be49}input,button{border:1px solid #3c5778;border-radius:8px;background:#0f1a2a;color:#eef4ff;padding:.7rem}button{background:#f3be49;color:#251a06;font-weight:700}.row{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center}.file{border:1px solid #35506f;border-radius:10px;padding:.7rem;margin:.5rem 0;background:#0f1a2a}.file a{color:#f3be49}</style></head><body><main class="wrap"><h1>Arquivos online</h1><form id="form" class="row"><input id="arquivo" type="file" required><label><input id="publico" type="checkbox"> Público</label><button>Enviar</button></form><p id="status"></p><section id="lista"></section></main><script src="../js/runtime-api.js"></script><script>const rt=window.ordoRuntime;if(!rt.getToken())location.href='/login';async function load(){try{const r=await rt.apiFetch('/api/arquivos');const d=await r.json();lista.innerHTML=d.map(f=>`<div class="file"><strong>${f.nome_original}</strong><br>${f.mime_type||''} - ${f.tamanho_bytes||0} bytes - ${f.storage_provider}<br><a href="/api/arquivos/${f.id}/download">Baixar</a></div>`).join('')||'Nenhum arquivo.'}catch(e){lista.textContent=e.message}}form.addEventListener('submit',async e=>{e.preventDefault();status.textContent='Enviando...';try{const fd=new FormData();fd.append('arquivo',arquivo.files[0]);fd.append('publico',String(publico.checked));const r=await rt.apiFetch('/api/arquivos/upload',{method:'POST',body:fd});const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.erro||'Falha');status.textContent='Arquivo enviado.';form.reset();await load()}catch(err){status.textContent=err.message}});load()</script>  <script src="../js/app-shell.js" defer></script>
</body></html>
