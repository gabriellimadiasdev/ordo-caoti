<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Agenda Ordo Caoti</title><link rel="stylesheet" href="../css/app-shell.css"><style>body{margin:0;background:#07101a;color:#eef4ff;font-family:Segoe UI,Tahoma,sans-serif;padding:1rem}.wrap{max-width:1120px;margin:auto;display:grid;grid-template-columns:360px 1fr;gap:1rem}.card{background:#132232;border:1px solid #35506f;border-radius:14px;padding:1rem}h1,h2{color:#f3be49}input,textarea,button{width:100%;box-sizing:border-box;border:1px solid #3c5778;border-radius:8px;background:#0f1a2a;color:#eef4ff;padding:.65rem;margin:.25rem 0 .65rem}button{background:#f3be49;color:#251a06;font-weight:700}.event{border:1px solid #35506f;border-radius:10px;padding:.75rem;margin:.55rem 0;background:#0f1a2a}.event img{max-width:100%;border-radius:10px}.links a{color:#f3be49;margin-right:.5rem}.muted{color:#adc4dd;font-size:.9rem}@media(max-width:860px){.wrap{grid-template-columns:1fr}}</style></head><body><main class="wrap"><section class="card"><h1>Agenda</h1><p class="muted">Mestres, mentor e T.I. editam. Demais perfis visualizam.</p><form id="form" style="display:none"><input id="eventoId" type="hidden"><label>Título</label><input id="titulo" required><label>Descrição</label><textarea id="descricao"></textarea><label>Início</label><input id="inicio" type="datetime-local" required><label>Fim</label><input id="fim" type="datetime-local"><label>Foto URL</label><input id="foto"><label>Local/link da aula</label><input id="localizacao"><label>Links sociais (um por linha)</label><textarea id="links"></textarea><label>Notificar canais</label><label><input type="checkbox" value="google_calendar" class="canal"> Google Agenda</label><label><input type="checkbox" value="email" class="canal"> E-mail</label><label><input type="checkbox" value="whatsapp" class="canal"> WhatsApp</label><label><input type="checkbox" value="sms" class="canal"> SMS</label><button>Salvar evento</button><button type="button" id="processar">Processar notificações</button></form><p id="status"></p></section><section class="card"><h2>Próximos eventos</h2><div id="lista">Carregando...</div></section></main><script src="../js/runtime-api.js"></script><script>const rt=window.ordoRuntime;if(!rt.getToken())location.href='/login';let canEdit=false;function esc(s){return String(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}function dt(v){return v?new Date(v).toLocaleString('pt-BR'):'-'}function socialLinks(raw){const arr=Array.isArray(raw)?raw:[];return arr.map(x=>typeof x==='string'?x:x.url).filter(Boolean)}async function api(p,o){const r=await rt.apiFetch(p,o);const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.erro||'Falha');return d}async function load(){try{const d=await api('/agenda/eventos');canEdit=!!d.can_edit;form.style.display=canEdit?'block':'none';lista.innerHTML=d.eventos.map(e=>`<article class="event">${e.foto_url?`<img src="${esc(e.foto_url)}" alt="">`:''}<h3>${esc(e.titulo)}</h3><p>${esc(e.descricao||'')}</p><p><strong>Quando:</strong> ${dt(e.inicio_em)} ${e.fim_em?'até '+dt(e.fim_em):''}</p><p><strong>Local/link:</strong> ${esc(e.localizacao||'-')}</p><div class="links">${socialLinks(e.links_sociais).map(l=>`<a href="${esc(l)}" target="_blank" rel="noopener">link</a>`).join('')}</div>${canEdit?`<button onclick='edit(${JSON.stringify(e).replace(/'/g,"&#39;")})'>Editar</button>`:''}</article>`).join('')||'Sem eventos.'}catch(e){lista.textContent=e.message}}window.edit=(e)=>{eventoId.value=e.id;titulo.value=e.titulo||'';descricao.value=e.descricao||'';inicio.value=String(e.inicio_em||'').slice(0,16);fim.value=String(e.fim_em||'').slice(0,16);foto.value=e.foto_url||'';localizacao.value=e.localizacao||'';links.value=socialLinks(e.links_sociais).join('\n');scrollTo(0,0)};form.addEventListener('submit',async e=>{e.preventDefault();try{const body={titulo:titulo.value,descricao:descricao.value,inicio_em:inicio.value,fim_em:fim.value||null,foto_url:foto.value||null,localizacao:localizacao.value||null,links_sociais:links.value.split('\n').map(url=>({url:url.trim()})).filter(x=>x.url),notificar_canais:[...document.querySelectorAll('.canal:checked')].map(x=>x.value)};const id=eventoId.value;await api(id?`/agenda/eventos/${id}`:'/agenda/eventos',{method:id?'PUT':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});form.reset();eventoId.value='';await load()}catch(err){status.textContent=err.message}});processar.addEventListener('click',async()=>{try{status.textContent=JSON.stringify(await api('/agenda/notificacoes/processar',{method:'POST'}),null,2)}catch(e){status.textContent=e.message}});load()</script></body></html>
