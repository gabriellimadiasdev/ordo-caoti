<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Acesso de Mentor</title><link rel="stylesheet" href="../css/app-shell.css"><style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:#07101a;color:#eef4ff;font-family:Segoe UI,Tahoma,sans-serif;padding:1rem}.card{width:min(430px,100%);background:#132232;border:1px solid #35506f;border-radius:14px;padding:1.2rem}h1{color:#f3be49}input,button{width:100%;box-sizing:border-box;padding:.7rem;margin:.3rem 0 .8rem;border:1px solid #3c5778;border-radius:8px;background:#0f1a2a;color:#eef4ff}button{background:#f3be49;color:#251a06;font-weight:700}.muted{color:#adc4dd}</style></head><body><main class="card"><h1>Acesso de Mentor</h1><p class="muted">Mentores, professores e mestres acessam aulas, trilhas, avaliações e acompanhamento.</p><form id="form"><label>E-mail</label><input id="email" type="email" required><label>Senha</label><input id="senha" type="password" required><button>Entrar como mentor</button></form><p id="msg"></p><p><a href="/login">Voltar ao acesso principal</a></p></main><script src="../js/runtime-api.js"></script><script>const rt=window.ordoRuntime;form.onsubmit=async e=>{e.preventDefault();try{const r=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email.value.trim().toLowerCase(),senha:senha.value,session_type:'persistent',perfil_login:'mentor'})});const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.erro||'Falha ao entrar.');const ps=(d.user?.perfis_disponiveis||[]).map(p=>p.id);if(!ps.some(p=>['mentor','professor','mestre_fundador'].includes(p)))throw new Error('Este acesso exige perfil de mentor, professor ou mestre.');rt.saveSession(d.token,d.user,d.expiresAt,true);if(d.user.must_change_password){location.href='/alterar-senha';return}if(d.user.must_complete_profile){location.href='/dados-primeiro-acesso';return}location.href='/dashboard-mentor'}catch(err){msg.textContent=err.message}};</script></body></html>
