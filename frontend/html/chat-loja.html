<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Chat loja</title><link rel="stylesheet" href="../css/app-shell.css"><style>body{margin:0;background:#07101a;color:#eef4ff;font-family:Segoe UI,Tahoma,sans-serif;padding:1rem}.wrap{max-width:1000px;margin:auto;display:grid;grid-template-columns:300px 1fr;gap:1rem}.card{background:#132232;border:1px solid #35506f;border-radius:14px;padding:1rem}h1,h2{color:#f3be49}.chat{border:1px solid #35506f;border-radius:10px;background:#0f1a2a;height:55vh;overflow:auto;padding:.7rem}.msg{border-bottom:1px solid #243750;padding:.45rem 0}.meta{color:#adc4dd;font-size:.8rem}input,button{width:100%;box-sizing:border-box;border:1px solid #3c5778;border-radius:8px;background:#0f1a2a;color:#eef4ff;padding:.65rem;margin:.25rem 0}.row{display:flex;gap:.5rem}.row input{flex:1}button{background:#f3be49;color:#251a06;font-weight:700}.case{padding:.5rem;border-bottom:1px solid #243750;cursor:pointer}@media(max-width:760px){.wrap{grid-template-columns:1fr}}</style></head><body><main class="wrap"><section class="card"><h1>Chats da loja</h1><input id="lojistaId" placeholder="ID lojista para novo chat"><button id="novo">Abrir chat</button><div id="chats">Carregando...</div></section><section class="card"><h2 id="titulo">Selecione um chat</h2><div id="msgs" class="chat"></div><form id="form" class="row"><input id="texto" placeholder="Mensagem" required><button>Enviar</button></form></section></main><script src="../js/runtime-api.js"></script><script>const rt=window.ordoRuntime;if(!rt.getToken())location.href='/login';let active=null;function esc(s){return String(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}async function api(p,o){const r=await rt.apiFetch(p,o);const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.erro||'Falha');return d}async function loadChats(){const rows=await api('/loja/chats');chats.innerHTML=rows.map(c=>`<div class="case" onclick="openChat(${c.id})">#${c.id}<br>${esc(c.cliente_nome||'Cliente')} ↔ ${esc(c.lojista_nome||'Lojista')}</div>`).join('')||'Sem chats.'}window.openChat=async(id)=>{active=id;titulo.textContent=`Chat #${id}`;const rows=await api(`/loja/chats/${id}/mensagens`);msgs.innerHTML=rows.map(m=>`<div class="msg"><div class="meta">${esc(m.autor_nome||'Usuário')} - ${new Date(m.criado_em).toLocaleString('pt-BR')}</div>${esc(m.mensagem)}</div>`).join('')||'Sem mensagens.';msgs.scrollTop=msgs.scrollHeight};novo.onclick=async()=>{try{const d=await api('/loja/chats',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({lojista_id:Number(lojistaId.value)})});await loadChats();await openChat(d.chat.id)}catch(e){alert(e.message)}};form.addEventListener('submit',async e=>{e.preventDefault();if(!active)return;await api(`/loja/chats/${active}/mensagens`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mensagem:texto.value})});texto.value='';await openChat(active)});loadChats()</script>  <script src="../js/app-shell.js" defer></script>
</body></html>
