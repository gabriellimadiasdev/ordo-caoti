<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin Pós-venda</title><link rel="stylesheet" href="../css/app-shell.css"><style>body{margin:0;background:#07101a;color:#eef4ff;font-family:Segoe UI,Tahoma,sans-serif;padding:1rem}.wrap{max-width:1100px;margin:auto}.card{background:#132232;border:1px solid #35506f;border-radius:14px;padding:1rem;margin-bottom:1rem}h1,h2{color:#f3be49}.case{border:1px solid #35506f;border-radius:10px;padding:.7rem;margin:.5rem 0;background:#0f1a2a}textarea,select,button{width:100%;box-sizing:border-box;border:1px solid #3c5778;border-radius:8px;background:#0f1a2a;color:#eef4ff;padding:.65rem;margin:.25rem 0 .65rem}button{background:#f3be49;color:#251a06;font-weight:700}.muted{color:#adc4dd}</style></head><body><main class="wrap"><section class="card"><h1>Pós-venda e resolução CDC</h1><p class="muted">Painel para admin/T.I./lojista responder, propor solução, registrar reembolso/troca/cancelamento e auditar tratativas.</p><button id="refresh">Atualizar</button><div id="lista"></div></section><section class="card"><h2>Responder caso</h2><input id="caseId" placeholder="ID do caso"><select id="status"><option value="em_analise">Em análise</option><option value="aguardando_cliente">Aguardando cliente</option><option value="solucao_proposta">Solução proposta</option><option value="resolvida">Resolvida</option><option value="indeferida">Indeferida</option></select><textarea id="mensagem" placeholder="Resposta ao consumidor"></textarea><textarea id="solucao" placeholder="Solução aplicada: reembolso, troca, abatimento, cancelamento..."></textarea><button id="send">Registrar movimento</button><pre id="out"></pre></section></main><script src="../js/runtime-api.js"></script><script>const rt=window.ordoRuntime;if(!rt.getToken())location.href='/login-ti?next=/admin/pos-venda';async function api(p,o){const r=await rt.apiFetch(p,o);const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.erro||'Falha');return d}async function load(){try{const rows=await api('/vendas/resolucoes');lista.innerHTML=rows.map(c=>`<div class="case"><strong>#${c.id} ${c.tipo}</strong><br>Cliente: ${c.cliente_nome||c.usuario_id||'-'} | Status: ${c.status}<br>Base: ${c.base_legal||'-'}<br>${c.descricao||''}<br><button onclick="caseId.value=${c.id}">Responder</button></div>`).join('')||'Nenhum caso.'}catch(e){lista.textContent=e.message}}send.onclick=async()=>{try{out.textContent=JSON.stringify(await api(`/vendas/resolucoes/${caseId.value}/movimentos`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:status.value,mensagem:mensagem.value,solucao_aplicada:solucao.value,acao:'resposta_fornecedor'})}),null,2);await load()}catch(e){out.textContent=e.message}};refresh.onclick=load;load()</script>  <script src="../js/app-shell.js" defer></script>
</body></html>
