<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Chat de alunos</title><link rel="stylesheet" href="../css/app-shell.css"><style>body{margin:0;background:#07101a;color:#eef4ff;font-family:Segoe UI,Tahoma,sans-serif;padding:1rem}.wrap{max-width:900px;margin:auto;background:#132232;border:1px solid #35506f;border-radius:14px;padding:1rem}h1{color:#f3be49}.msgs{height:55vh;overflow:auto;background:#0f1a2a;border:1px solid #35506f;border-radius:10px;padding:.75rem}.msg{margin:.4rem 0;padding:.55rem;border-bottom:1px solid #243750}.meta{color:#adc4dd;font-size:.8rem}form{display:flex;gap:.5rem;margin-top:.75rem}input,button{border:1px solid #3c5778;border-radius:8px;background:#0f1a2a;color:#eef4ff;padding:.7rem}input{flex:1}button{background:#f3be49;color:#251a06;font-weight:700}</style></head><body><main class="wrap"><h1>Chat interno de alunos</h1><div id="msgs" class="msgs">Carregando...</div><form id="form"><input id="texto" maxlength="4000" placeholder="Escreva sua mensagem" required><button>Enviar</button></form><p id="status"></p></main><script src="../js/runtime-api.js"></script><script>const rt=window.ordoRuntime,box=msgs,canal='alunos-geral';if(!rt.getToken())location.href='/login';function esc(s){return String(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}async function load(){try{const r=await rt.apiFetch(`/chat/alunos/${canal}/mensagens`);const d=await r.json();box.innerHTML=d.map(m=>`<div class="msg"><div class="meta">${esc(m.autor_nome||'Aluno')} - ${new Date(m.criado_em).toLocaleString('pt-BR')}</div><div>${esc(m.mensagem)}</div></div>`).join('')||'Sem mensagens.';box.scrollTop=box.scrollHeight}catch(e){box.textContent=e.message}}form.addEventListener('submit',async e=>{e.preventDefault();try{const r=await rt.apiFetch(`/chat/alunos/${canal}/mensagens`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mensagem:texto.value})});if(!r.ok){const d=await r.json().catch(()=>({}));throw new Error(d.erro||'Falha')}texto.value='';await load()}catch(err){status.textContent=err.message}});load();setInterval(load,15000)</script>  <script src="../js/app-shell.js" defer></script>
</body></html>
