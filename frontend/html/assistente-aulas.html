<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Assistente de aulas</title><link rel="stylesheet" href="../css/app-shell.css"><style>body{margin:0;background:#07101a;color:#eef4ff;font-family:Segoe UI,Tahoma,sans-serif;padding:1rem}.wrap{max-width:1000px;margin:auto}.card{background:#132232;border:1px solid #35506f;border-radius:14px;padding:1rem}h1{color:#f3be49}input,textarea,button{width:100%;box-sizing:border-box;border:1px solid #3c5778;border-radius:8px;background:#0f1a2a;color:#eef4ff;padding:.7rem;margin:.35rem 0 .8rem}button{background:#f3be49;color:#251a06;font-weight:700}.plan{white-space:pre-wrap;background:#0f1a2a;border-radius:10px;padding:1rem}.muted{color:#adc4dd}</style></head><body><main class="wrap"><section class="card"><h1>Assistente de criação de aulas</h1><p class="muted">Informe qualquer assunto. O assistente cria um rascunho simples e envia para aprovação.</p><form id="form"><label>Assunto da aula</label><input id="tema" required placeholder="Ex: símbolos, meditação, tarot, logística da loja..."><label>Objetivo</label><textarea id="objetivo" placeholder="O que os alunos devem aprender?"></textarea><label>Nível</label><input id="nivel" placeholder="neófito, mago iniciado, turma livre..."><button>Criar rascunho para aprovação</button></form><div id="out" class="plan"></div></section></main><script src="../js/runtime-api.js"></script><script>const rt=window.ordoRuntime;if(!rt.getToken())location.href='/login';form.addEventListener('submit',async e=>{e.preventDefault();try{const r=await rt.apiFetch('/academico/assistente-aulas',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tema:tema.value,objetivo:objetivo.value,nivel_codigo:nivel.value})});const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.erro||'Falha');out.textContent=JSON.stringify(d.plano,null,2).replace(/[{}"\[\],]/g,'').replace(/_/g,' ')}catch(err){out.textContent=err.message}})</script>  <script src="../js/app-shell.js" defer></script>
</body></html>
