<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Importar aulas</title><link rel="stylesheet" href="../css/app-shell.css"><style>body{margin:0;background:#07101a;color:#eef4ff;font-family:Segoe UI,Tahoma,sans-serif;padding:1rem}.wrap{max-width:980px;margin:auto}.card{background:#132232;border:1px solid #35506f;border-radius:14px;padding:1rem}h1{color:#f3be49}input,select,textarea,button{width:100%;box-sizing:border-box;border:1px solid #3c5778;border-radius:8px;background:#0f1a2a;color:#eef4ff;padding:.7rem;margin:.35rem 0 .8rem}button{background:#f3be49;color:#251a06;font-weight:700}.muted{color:#adc4dd}</style></head><body><main class="wrap"><section class="card"><h1>Importar aulas e materiais</h1><p class="muted">Cole aqui conteúdos vindos do Google Classroom ou Notion. Tudo vai para aprovação antes de aparecer para os alunos.</p><form id="form"><label>Origem</label><select id="origem"><option value="classroom">Google Classroom</option><option value="notion">Notion</option></select><label>Título</label><input id="titulo" required><label>Conteúdo importado</label><textarea id="conteudo" rows="14" required placeholder="Cole as aulas, tarefas, links e observações aqui"></textarea><button>Enviar para aprovação</button></form><pre id="out"></pre></section></main><script src="../js/runtime-api.js"></script><script>const rt=window.ordoRuntime;if(!rt.getToken())location.href='/login';form.addEventListener('submit',async e=>{e.preventDefault();try{const path=origem.value==='notion'?'/academico/importar/notion':'/academico/importar/classroom';const r=await rt.apiFetch(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({titulo:titulo.value,conteudo:conteudo.value})});const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.erro||'Falha');out.textContent='Importação registrada e enviada para aprovação.'}catch(err){out.textContent=err.message}})</script></body></html>
