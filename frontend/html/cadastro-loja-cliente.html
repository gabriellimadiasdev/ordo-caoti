<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Criar Conta - Loja Ordo Caoti</title>
    <link rel="stylesheet" href="../css/style-login-loja.css">
    <style>
        /* Estilos para a estrutura do formulario */
        .login-box h2 {
            font-size: 1.2rem;
            color: var(--amarelo);
            text-align: left;
            margin-top: 2rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #333;
            padding-bottom: 0.5rem;
        }
        .form-row {
            display: flex;
            gap: 1rem;
        }
        .form-row .input-group {
            flex: 1;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 1.5rem 0;
            font-size: 0.85rem;
        }
        .checkbox-group input {
            width: auto;
        }
        .checkbox-group label {
            margin: 0;
            font-weight: normal;
        }
        #msgBox.success {
            color: #4cd137; /* Verde para sucesso */
        }
    </style>

  <link rel="stylesheet" href="../css/responsivo.css">
  <link rel="stylesheet" href="../css/app-shell.css">
  <link rel="manifest" href="../manifest.webmanifest">
  <meta name="theme-color" content="#0b0f16">
</head>
<body>
    <main class="login-container">
        <section class="login-box">
            <header>
                <h1>Inscreva-se na nossa Loja</h1>
                <p>Crie sua conta para adquirir os produtos feitos pelos membros da Ordo Caoti.</p>
            </header>
            
            <form id="registerForm">
                <!-- Dados Pessoais -->
                <h2>Dados Pessoais</h2>
                <div class="input-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" name="nome" required placeholder="Seu nome completo" />
                </div>
                <div class="form-row">
                    <div class="input-group">
                        <label for="cpf">CPF</label>
                        <input type="text" id="cpf" name="cpf" required placeholder="000.000.000-00" maxlength="14" />
                    </div>
                    <div class="input-group">
                        <label for="nascimento">Data de Nascimento</label>
                        <input type="date" id="nascimento" name="nascimento" required />
                    </div>
                </div>
                 <div class="input-group">
                    <label for="telefone">Telefone / Celular</label>
                    <input type="tel" id="telefone" name="telefone" required placeholder="(00) 90000-0000" />
                </div>

                <!-- Endereço de Entrega -->
                <h2>Endereco de Entrega</h2>
                <div class="input-group">
                    <label for="cep">CEP</label>
                    <input type="text" id="cep" name="cep" required placeholder="00000-000" maxlength="9" />
                </div>
                 <div class="form-row">
                    <div class="input-group" style="flex: 3;">
                        <label for="logradouro">Logradouro</label>
                        <input type="text" id="logradouro" name="logradouro" required placeholder="Sua rua ou avenida" />
                    </div>
                    <div class="input-group">
                        <label for="numero">Número</label>
                        <input type="text" id="numero" name="numero" required />
                    </div>
                </div>
                <div class="input-group">
                    <label for="complemento">Complemento (Opcional)</label>
                    <input type="text" id="complemento" name="complemento" placeholder="Apto, bloco, casa, etc." />
                </div>
                <div class="form-row">
                    <div class="input-group">
                        <label for="bairro">Bairro</label>
                        <input type="text" id="bairro" name="bairro" required />
                    </div>
                    <div class="input-group">
                        <label for="cidade">Cidade</label>
                        <input type="text" id="cidade" name="cidade" required />
                    </div>
                    <div class="input-group" style="flex: 0.5;">
                        <label for="estado">UF</label>
                        <input type="text" id="estado" name="estado" required maxlength="2" />
                    </div>
                </div>

                <!-- Dados da Conta -->
                <h2>Dados da Conta</h2>
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" required placeholder="seu@email.com" />
                </div>
                <div class="form-row">
                    <div class="input-group">
                        <label for="password">Senha</label>
                        <input type="password" id="password" name="password" required placeholder="Mín. 8 caracteres, 1 maiúscula, 1 número" />
                    </div>
                    <div class="input-group">
                        <label for="confirmPassword">Confirmar Senha</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Repita a senha" />
                    </div>
                </div>

                <h2>Preferencias de Pagamento</h2>
                <div class="form-row">
                    <div class="input-group">
                        <label for="dia_pagamento">Dia preferido para cobranca recorrente (1-28)</label>
                        <input type="number" id="dia_pagamento" name="dia_pagamento" min="1" max="28" value="10" />
                    </div>
                    <div class="input-group">
                        <label for="recorrencia_aceita">Aceita pagamentos recorrentes</label>
                        <select id="recorrencia_aceita" name="recorrencia_aceita">
                            <option value="true">Sim</option>
                            <option value="false">Nao</option>
                        </select>
                    </div>
                </div>
                <div class="input-group">
                    <label>Wallets preferidas (o processamento real depende dos metodos habilitados no gateway)</label>
                    <div class="checkbox-group"><input type="checkbox" id="wallet_pix" value="pix" checked /><label for="wallet_pix">PIX</label></div>
                    <div class="checkbox-group"><input type="checkbox" id="wallet_googlepay" value="google_pay" /><label for="wallet_googlepay">Google Pay</label></div>
                    <div class="checkbox-group"><input type="checkbox" id="wallet_applepay" value="apple_pay" /><label for="wallet_applepay">Apple Pay</label></div>
                    <div class="checkbox-group"><input type="checkbox" id="wallet_paypal" value="paypal" /><label for="wallet_paypal">PayPal</label></div>
                    <div class="checkbox-group"><input type="checkbox" id="wallet_nupay" value="nu_pay" /><label for="wallet_nupay">NuPay</label></div>
                </div>

                <!-- Termos e finalizacao -->
                <div class="checkbox-group">
                    <input type="checkbox" id="termos" name="termos" required />
                    <label for="termos">Li e concordo com os <a href="#" target="_blank">Termos de Servico</a> e a <a href="#" target="_blank">Politica de Privacidade</a>.</label>
                </div>
                
                <button type="submit" class="btn-login">Criar Conta</button>
                
                <div id="msgBox" style="margin-top: 1rem; text-align: center; display: none; font-size: 0.9rem;"></div>

                <div class="form-footer">
                    <p>Ja possui conta? <a href="./login-loja-cliente.html">Fazer login</a></p>
                </div>
            </form>
        </section>
    </main>

    <script src="../js/runtime-api.js"></script>
    <script>
        const runtime = window.ordoRuntime || null;
        const apiUrl = (path) => (runtime && typeof runtime.apiUrl === 'function' ? runtime.apiUrl(path) : path);
        const msgBox = document.getElementById('msgBox');

        function showMessage(message, isSuccess = false) {
            msgBox.textContent = message;
            msgBox.className = isSuccess ? 'success' : '';
            msgBox.style.display = 'block';
        }

        // Mascaras de CPF e CEP
        document.getElementById('cpf').addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, '');
            value = value.replace(/(\d{3})(\d)/, '$1.$2');
            value = value.replace(/(\d{3})(\d)/, '$1.$2');
            value = value.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
            e.target.value = value;
        });

        document.getElementById('cep').addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, '');
            value = value.replace(/^(\d{5})(\d)/, '$1-$2');
            e.target.value = value;
        });

        // Busca de endereco por CEP (ViaCEP)
        document.getElementById('cep').addEventListener('blur', async (e) => {
            const cep = e.target.value.replace(/\D/g, '');
            if (cep.length !== 8) return;

            try {
                const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                if (!response.ok) throw new Error('CEP não encontrado.');
                const data = await response.json();
                if (data.erro) throw new Error('CEP inválido.');

                document.getElementById('logradouro').value = data.logradouro;
                document.getElementById('bairro').value = data.bairro;
                document.getElementById('cidade').value = data.localidade;
                document.getElementById('estado').value = data.uf;
                document.getElementById('numero').focus(); // Foca no número após preencher
            } catch (error) {
                showMessage(error.message);
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            msgBox.style.display = 'none';

            // Validações
            const senha = document.getElementById('password').value;
            const confirma = document.getElementById('confirmPassword').value;
            const termos = document.getElementById('termos').checked;

            if (senha !== confirma) {
                showMessage('As senhas não coincidem.');
                return;
            }

            const senhaRegex = /^(?=.*[A-Z])(?=.*\d).{8,}$/;
            if (!senhaRegex.test(senha)) {
                showMessage('A senha deve ter no mínimo 8 caracteres, 1 letra maiúscula e 1 número.');
                return;
            }

            if (!termos) {
                showMessage('Você precisa aceitar os Termos de Serviço e a Política de Privacidade para prosseguir.');
                return;
            }

            const wallets = [];
            ['wallet_pix', 'wallet_googlepay', 'wallet_applepay', 'wallet_paypal', 'wallet_nupay'].forEach((id) => {
                const input = document.getElementById(id);
                if (input && input.checked) wallets.push(input.value);
            });

            // Coleta de dados do formulário
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            data.recorrencia_aceita = data.recorrencia_aceita === 'true';
            data.wallets_preferidas = wallets;
            data.dia_pagamento = Number(data.dia_pagamento || 10);

            try {
                const response = await fetch(apiUrl('/api/loja/clientes/cadastro-rapido'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json().catch(() => ({}));

                if (!response.ok) {
                    throw new Error(result?.erro || 'Falha ao cadastrar cliente.');
                }

                showMessage('Cadastro realizado com sucesso! Redirecionando para o login...', true);
                setTimeout(() => {
                    window.location.href = './login-loja-cliente.html';
                }, 1500);
            } catch (error) {
                showMessage(error.message || 'Erro ao cadastrar cliente.');
            }
        });
    </script>

  <script src="../js/app-shell.js" defer></script>
</body>
</html>
