<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat com Lojista - Ordo Caoti</title>
    <style>
        :root {
            --color-black: #050505;
            --color-dark-grey: #111111;
            --color-mid-grey: #222222;
            --color-light-grey: #a9a9a9;
            --color-white: #f0f0f0;
            --color-yellow: #ffc400;
            --color-purple: #c8a2c8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--color-black);
            color: var(--color-white);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 1rem 2rem;
            background-color: var(--color-dark-grey);
            border-bottom: 1px solid var(--color-mid-grey);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            margin: 1rem auto;
            width: 95%;
            background: var(--color-dark-grey);
            border-radius: 12px;
            border: 1px solid var(--color-mid-grey);
            overflow: hidden;
        }

        .chat-header {
            padding: 1rem;
            background: var(--color-mid-grey);
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .chat-header img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }
        .chat-header h2 {
            margin: 0;
            font-size: 1.2rem;
            color: var(--color-yellow);
        }
        .chat-messages {
            flex: 1;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            overflow-y: auto;
        }
        .chat-message {
            background-color: var(--color-mid-grey);
            padding: 0.75rem 1rem;          
            border-radius: 8px;
            max-width: 70%;
            word-wrap: break-word;
        }
        .chat-message.client {
            align-self: flex-end;
            background-color: var(--color-purple);
        }
        .chat-input {
            display: flex;
            padding: 1rem;
            background-color: var(--color-mid-grey);
            gap: 0.5rem;
        }
        .chat-input input {
            flex: 1;
            padding: 0.5rem;
            border: 1px solid var(--color-light-grey);
            border-radius: 5px;
        }
        .chat-input button {
            padding: 0.5rem 1rem;
            background-color: var(--color-yellow);
            color: var(--color-black);
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
    <link rel="stylesheet" href="../css/responsivo.css">
    <link rel="stylesheet" href="../css/app-shell.css">
    <link rel="manifest" href="../manifest.webmanifest">
    <meta name="theme-color" content="#0b0f16">
</head> 
<body>
    <header>
        <h1>Ordo Caoti - Chat com Lojista</h1>

        <a href="/" style="color: var(--color-light-grey); text-decoration: none;">Voltar ao Início</a>

    </header>
  

<div class="chat-container">
        <div class="chat-header">
            <img src="/images/lojista-avatar.png" alt="Avatar do Lojista">
            <h2>Loja da Ordem</h2>
        </div>
        <div class="chat-messages">
            <div class="chat-message">
                Olá! Bem-vindo ao chat da Loja da Ordem. Como posso ajudar você hoje?
            </div>
        </div>
    
    <div class="chat-input">
        <input type="text" placeholder="Digite sua mensagem...">
        <button>Enviar</button>
        </div>

    <script src="../js/app-shell.js" defer></script>
    
</body>
</html>
