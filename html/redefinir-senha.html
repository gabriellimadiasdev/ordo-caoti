<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Senha - Ordo Caoti</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #2a2a2a;
            padding: 2.5rem;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #333;
        }
        h2 { color: #c8a2c8; margin-top: 0; margin-bottom: 1.5rem; }
        input {
            width: 100%; padding: 0.8rem; border: 1px solid #444; border-radius: 5px;
            background-color: #333; color: #fff; font-size: 1rem; box-sizing: border-box;
            margin-bottom: 1rem;
        }
        input:focus { border-color: #c8a2c8; outline: none; }
        button {
            width: 100%; padding: 1rem; background-color: #c8a2c8; color: #1a1a1a;
            border: none; border-radius: 5px; font-weight: bold; font-size: 1rem;
            cursor: pointer; transition: background-color 0.3s;
        }
        button:hover { background-color: #b08cb0; }
        .msg {
            margin-top: 1rem; padding: 0.8rem; border-radius: 5px; display: none; font-size: 0.9rem;
        }
        .error { background-color: rgba(255, 107, 107, 0.1); color: #ff6b6b; border: 1px solid rgba(255, 107, 107, 0.3); }
    </style>

  <link rel="stylesheet" href="../css/responsivo.css">
  <link rel="stylesheet" href="../css/app-shell.css">
  <link rel="manifest" href="../manifest.webmanifest">
  <meta name="theme-color" content="#0b0f16">
</head>
<body>
    <div class="card">
        <h2>Nova Senha</h2>
        
        <div id="formContainer">
            <form id="newPasswordForm">
                <input type="password" id="senha" required placeholder="Nova senha">
                <input type="password" id="confirmaSenha" required placeholder="Confirme a nova senha">
                <button type="submit">Alterar Senha</button>
            </form>
        </div>

        <div id="msgBox" class="msg"></div>
        <div id="successActions" style="display: none; margin-top: 1.5rem;">
            <p style="color: #4cd137;">Senha alterada com sucesso!</p>
            <button onclick="window.location.href='./login.html'">Ir para Login</button>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        if (!token) {
            document.getElementById('formContainer').style.display = 'none';
            document.getElementById('msgBox').textContent = 'Link invÃ¡lido ou incompleto.';
            document.getElementById('msgBox').className = 'msg error';
            document.getElementById('msgBox').style.display = 'block';
        }

        document.getElementById('newPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const senha = document.getElementById('senha').value;
            const confirma = document.getElementById('confirmaSenha').value;
            const msgBox = document.getElementById('msgBox');

            if (senha !== confirma) {
                msgBox.textContent = 'As senhas nÃ£o coincidem.';
                msgBox.className = 'msg error';
                msgBox.style.display = 'block';
                return;
            }

            const response = await fetch('/api/redefinir-senha', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, novaSenha: senha })
            });

            if (response.ok) {
                document.getElementById('formContainer').style.display = 'none';
                document.getElementById('msgBox').style.display = 'none';
                document.getElementById('successActions').style.display = 'block';
            } else {
                const data = await response.json();
                msgBox.textContent = data.erro || 'Erro ao alterar senha.';
                msgBox.className = 'msg error';
                msgBox.style.display = 'block';
            }
        });
    </script>

  <script src="../js/app-shell.js" defer></script>
</body>
</html>
